# SINGLE SOURCE OF TRUTH for the browser <-> Node API.
# Edit here, then run codegen -> packages/shared-types. Do NOT hand-write TS types.
openapi: 3.1.0
info:
  title: CodeSage Node API
  version: 0.1.0
  description: >-
    Public, non-blocking API served by apps/api. See docs/final-solution.md §9.
servers:
  - url: /api
paths:
  /health:
    get:
      operationId: getApiHealth
      summary: API health check
      description: Returns the liveness status of the Node API service.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with email + password and receive a JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      operationId: getMe
      summary: Returns the authenticated user's profile.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/search:
    get:
      operationId: searchUsers
      summary: Prefix-search users by email (admin only).
      description: >-
        Returns active users whose email starts with the query string (case-insensitive).
        Includes internal service accounts for audit-log actor autocomplete.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
          description: Email prefix to match (minimum 2 characters).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
          description: Maximum number of results.
      responses:
        '200':
          description: Matching users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSearchResult'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      operationId: createUser
      summary: Create a new user (admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    patch:
      operationId: updateUserRole
      summary: Update a user's RBAC role (admin only).
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the user whose role will be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleRequest'
      responses:
        '200':
          description: Updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: List security audit events (admin only).
      description: >-
        Returns paginated audit log entries newest first. When tsFrom/tsTo are omitted,
        defaults to the last 30 days. Uses hasMore (fetch pageSize+1) instead of a total
        count for performance on large tables. Maximum lookback is 365 days.
      security:
        - bearerAuth: []
      parameters:
        - name: actorId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by actor user UUID.
        - name: action
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AuditAction'
          description: Filter by exact action verb.
        - name: tsFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound (defaults to now minus 30 days).
        - name: tsTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive upper bound (defaults to now).
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based). page × pageSize must not exceed 10 000.
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Rows per page.
      responses:
        '200':
          description: Paginated audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects:
    get:
      operationId: listProjects
      summary: List all projects accessible to the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createProject
      summary: Create a new project.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}:
    get:
      operationId: getProject
      summary: Get a single project by ID.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteProject
      summary: Soft-delete a project and detach its repositories.
      description: >-
        Sets row status to Deleted on the project and soft-detaches each active repo
        (webhook unregister). Indexed data remains until a future purge operation.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project deleted.
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /repos/probe:
    post:
      operationId: probeRepo
      summary: Probe a repository URL before attach (branches, README, auth check).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeRepoRequest'
      responses:
        '200':
          description: Probe result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeRepoResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/{provider}:
    post:
      operationId: receiveWebhook
      summary: Receive a push webhook from GitHub or GitLab (public route).
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/RepoProvider'
      responses:
        '204':
          description: Webhook accepted.
        '401':
          description: Invalid webhook signature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repository not registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}/repos:
    get:
      operationId: listRepos
      summary: List repos attached to a project.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of repos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repo'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: attachRepo
      summary: Attach a repository to a project and enqueue an initial sync job.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepoRequest'
      responses:
        '202':
          description: Repo attached; sync job enqueued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachRepoResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      summary: Returns aggregate dashboard counters for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/sessions:
    get:
      operationId: listDashboardSessions
      summary: Returns recent chat sessions for the dashboard overview.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of recent chat sessions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSession'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/query:
    post:
      operationId: chatQuery
      summary: Stream a grounded code answer with citations (proxied to RAG service)
      description: >-
        Accepts a developer question scoped to a project and streams answer chunks via
        Server-Sent Events. Each event is a JSON-encoded ChatAnswerChunk. Proxies to
        apps/rag POST /rag/query without blocking the Node event loop.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatQueryRequest'
      responses:
        '200':
          description: SSE stream of ChatAnswerChunk objects.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatAnswerChunk'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: RAG service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}/repos/{repoId}:
    delete:
      operationId: deleteRepo
      summary: Soft-detach a repository from a project.
      description: >-
        Sets row status to Deleted on the repo and unregisters the provider webhook.
        Indexed chunks and graph data remain until a future purge operation.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: repoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Repo soft-detached.
        '404':
          description: Repo or project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}/repos/{repoId}/indexing-events:
    get:
      operationId: listRepoIndexingEvents
      summary: List indexing progress events for a repository (newest first).
      description: >-
        Cursor-paginated timeline of sync/parse/embed step events for one repo.
        Use nextCursor to load older rows (infinite scroll).
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: repoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 50
          description: Page size (capped at 50).
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor from a previous response nextCursor field.
      responses:
        '200':
          description: Paginated indexing events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoIndexingEventListResponse'
        '400':
          description: Invalid cursor or limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repo or project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}/repos/{repoId}/sync:
    post:
      operationId: syncRepo
      summary: Manually enqueue a sync job for a repository.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: repoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Sync job enqueued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRepoResponse'
        '404':
          description: Repo or project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Indexing already in progress for this repository.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: ['ok']
          description: Always "ok" when the service is reachable.
        service:
          type: string
          description: Name of the reporting service.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error description.
            details:
              description: Optional extra context (e.g. field-level validation errors).

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address.
        password:
          type: string
          minLength: 8
          description: User's password (min 8 characters).

    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Signed JWT for use in Authorization headers.
        user:
          $ref: '#/components/schemas/User'

    UserRole:
      type: string
      enum:
        - admin
        - expert
        - developer
        - end_user
      description: RBAC role assigned to the user.

    User:
      type: object
      required:
        - id
        - email
        - role
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier.
        email:
          type: string
          format: email
          description: User's email address.
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time
          description: UTC timestamp when the account was created.

    CreateUserRequest:
      type: object
      required:
        - email
        - password
        - role
      properties:
        email:
          type: string
          format: email
          description: Email address for the new account.
        password:
          type: string
          minLength: 8
          description: Initial password (min 8 characters).
        role:
          $ref: '#/components/schemas/UserRole'

    UpdateUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          $ref: '#/components/schemas/UserRole'

    UserSearchResult:
      type: object
      required:
        - id
        - email
        - isSystem
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        isSystem:
          type: boolean
          description: True for internal service accounts (e.g. rag-worker@codesage.internal).

    AuditAction:
      type: string
      enum:
        - user.create
        - user.role_change
        - project.create
        - project.delete
        - repo.attach
        - repo.detach
        - repo.sync
      description: Machine-readable audit action verb.

    AuditLogEntry:
      type: object
      required:
        - id
        - action
        - ts
      properties:
        id:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
          nullable: true
          description: User who performed the action; null when deleted.
        actorEmail:
          type: string
          format: email
          nullable: true
          description: Actor email from users join; null when actor was deleted.
        action:
          $ref: '#/components/schemas/AuditAction'
        target:
          type: string
          nullable: true
          description: Resource identifier or description of what was affected.
        ts:
          type: string
          format: date-time
          description: Event timestamp (UTC).

    AuditLogListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - hasMore
        - tsFrom
        - tsTo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        hasMore:
          type: boolean
          description: True when another page exists after this one.
        tsFrom:
          type: string
          format: date-time
          description: Applied lower bound (echoed from request or default).
        tsTo:
          type: string
          format: date-time
          description: Applied upper bound (echoed from request or default).

    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable project name.

    ProjectStatus:
      type: string
      enum:
        - active
        - indexed
        - indexing
        - stale
        - connecting
        - error
      description: Lifecycle state of a project's indexing pipeline.

    Project:
      type: object
      required:
        - id
        - name
        - status
        - repoCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique project identifier.
        name:
          type: string
          description: Human-readable project name.
        status:
          $ref: '#/components/schemas/ProjectStatus'
        repoCount:
          type: integer
          minimum: 0
          description: Number of repositories currently attached to this project.
        createdAt:
          type: string
          format: date-time
          description: UTC timestamp when the project was created.

    ChatMode:
      type: string
      enum:
        - developer
        - end_user
      description: Persona used in a chat session — code-level (developer) or product/usage (end_user).

    ChatSession:
      type: object
      required:
        - id
        - title
        - mode
        - messageCount
      properties:
        id:
          type: string
          description: Unique session identifier.
        title:
          type: string
          description: Human-readable session title.
        mode:
          $ref: '#/components/schemas/ChatMode'
        projectId:
          type: string
          format: uuid
          nullable: true
          description: Project this session is scoped to, or null for general sessions.
        projectName:
          type: string
          nullable: true
          description: Display name of the scoped project, or null.
        messageCount:
          type: integer
          minimum: 0
          description: Total number of messages in this session.
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 UTC timestamp of the latest message, or null if none yet.

    DashboardStats:
      type: object
      required:
        - projectCount
        - indexedProjectCount
        - sessionCount
        - knowledgeCount
        - pendingReviewCount
      properties:
        projectCount:
          type: integer
          minimum: 0
          description: Total number of projects.
        indexedProjectCount:
          type: integer
          minimum: 0
          description: Number of projects with status "indexed".
        sessionCount:
          type: integer
          minimum: 0
          description: Total number of chat sessions.
        knowledgeCount:
          type: integer
          minimum: 0
          description: Total number of distilled knowledge entries.
        pendingReviewCount:
          type: integer
          minimum: 0
          description: Number of answers currently awaiting expert review.

    RepoProvider:
      type: string
      enum:
        - github
        - gitlab
      description: Git hosting provider.

    RepoConnectionStatus:
      type: string
      enum:
        - connecting
        - connected
        - error
      description: Git connection / sync health for this repo.

    ProbeRepoRequest:
      type: object
      required:
        - repoUrl
      properties:
        repoUrl:
          type: string
          description: HTTPS clone URL to probe.
        token:
          type: string
          description: >-
            Optional access token for private repos. Used only for this request;
            never stored or logged.

    ProbeRepoResponse:
      type: object
      required:
        - provider
        - fullName
        - defaultBranch
        - branches
        - description
        - isPrivate
        - authRequired
        - notFound
      properties:
        provider:
          $ref: '#/components/schemas/RepoProvider'
        fullName:
          type: string
          description: e.g. org/repo
        baseUrl:
          type: string
          description: Git host origin (differs for self-hosted GitLab).
        defaultBranch:
          type: string
        branches:
          type: array
          maxItems: 5
          items:
            type: string
          description: Up to five branch names from the provider API.
        description:
          type: string
          description: README excerpt or repo metadata description.
        isPrivate:
          type: boolean
        authRequired:
          type: boolean
          description: True when probe hit 401/403 without a valid token.
        notFound:
          type: boolean
        primaryLanguage:
          type: string
          description: Primary programming language from the provider API (e.g. Python).

    CreateRepoRequest:
      type: object
      required:
        - repoUrl
        - branch
      properties:
        repoUrl:
          type: string
          description: HTTPS clone URL of the repository.
        branch:
          type: string
          description: Branch to index.
        description:
          type: string
          description: User-editable repo description (from README by default).
        baseUrl:
          type: string
          description: Self-hosted GitLab origin when hostname is not gitlab.com.
        token:
          type: string
          description: >-
            Read-only deploy token for private repos. Encrypted at rest; never
            returned in responses.
        primaryLanguage:
          type: string
          description: Primary language from probe (stored on attach).

    Repo:
      type: object
      required:
        - id
        - projectId
        - repoUrl
        - provider
        - branch
        - fullName
        - isPrivate
        - connectionStatus
        - webhookEnabled
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique repo identifier.
        projectId:
          type: string
          format: uuid
          description: Parent project ID.
        repoUrl:
          type: string
          description: HTTPS clone URL.
        provider:
          $ref: '#/components/schemas/RepoProvider'
        branch:
          type: string
          description: Indexed branch.
        fullName:
          type: string
          description: e.g. org/repo
        description:
          type: string
          description: User-editable description.
        baseUrl:
          type: string
          description: Self-hosted GitLab origin when applicable.
        isPrivate:
          type: boolean
        connectionStatus:
          $ref: '#/components/schemas/RepoConnectionStatus'
        lastError:
          type: string
          description: Last indexing or connection error when connectionStatus is error (sync, parse, or embed).
        lastErrorAt:
          type: string
          format: date-time
          description: UTC timestamp of lastError.
        webhookEnabled:
          type: boolean
          description: Whether a push webhook is registered for auto-sync.
        lastIndexedSha:
          type: string
          description: Git SHA of the last successfully synced commit.
        lastIndexedAt:
          type: string
          format: date-time
          description: >-
            UTC timestamp when last_indexed_sha was last updated (git sync
            completion, not full embed pipeline).
        primaryLanguage:
          type: string
          description: Primary programming language (from provider at attach).
        indexedFileCount:
          type: integer
          minimum: 0
          description: Distinct indexed file paths in code_chunks for this repo.
        createdAt:
          type: string
          format: date-time
          description: UTC timestamp when the repo was attached.

    AttachRepoResponse:
      type: object
      required:
        - repo
        - jobId
      properties:
        repo:
          $ref: '#/components/schemas/Repo'
        jobId:
          type: string
          format: uuid
          description: ID of the enqueued sync job.

    SyncRepoResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid
          description: ID of the enqueued sync job.

    IndexingEventStep:
      type: string
      enum: [sync, parse, embed]
      description: Indexing pipeline step.

    IndexingEventPhase:
      type: string
      enum: [started, finished, failed, skipped]
      description: Step lifecycle phase.

    IndexingEventTrigger:
      type: string
      enum: [initial_attach, manual_sync, webhook_push]
      description: What caused the indexing run.

    RepoIndexingEvent:
      type: object
      required:
        - id
        - runId
        - step
        - phase
        - startedAt
        - message
      properties:
        id:
          type: string
          format: uuid
          description: Event row identifier.
        runId:
          type: string
          format: uuid
          description: Groups sync, parse, and embed for one indexing attempt.
        step:
          $ref: '#/components/schemas/IndexingEventStep'
        phase:
          $ref: '#/components/schemas/IndexingEventPhase'
        startedAt:
          type: string
          format: date-time
          description: Event timestamp (UTC).
        durationMs:
          type: integer
          minimum: 0
          description: Step duration; omitted on started phase.
        message:
          type: string
          description: Plain-English user-facing message.
        failureReason:
          type: string
          description: Sanitized explanation when phase is failed.
        trigger:
          $ref: '#/components/schemas/IndexingEventTrigger'
        details:
          type: object
          additionalProperties: true
          description: Optional metrics (commit_sha, file_count, …).

    RepoIndexingEventListResponse:
      type: object
      required:
        - items
        - limit
        - hasMore
        - nextCursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RepoIndexingEvent'
        limit:
          type: integer
          minimum: 1
          maximum: 50
          description: Page size used for this response.
        hasMore:
          type: boolean
          description: True when older events exist beyond this page.
        nextCursor:
          type: string
          nullable: true
          description: Pass as cursor query param to fetch the next older page.

    ChatQueryRequest:
      type: object
      required:
        - question
        - projectId
        - audience
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 8000
          description: Natural-language question from the user.
        projectId:
          type: string
          format: uuid
          description: Project scope for retrieval.
        audience:
          $ref: '#/components/schemas/ChatMode'
        generateTitle:
          type: boolean
          default: false
          description: >-
            When true, the RAG service emits a `title` chunk summarizing the question
            (used for the first message in a conversation).
        repoIds:
          type: array
          items:
            type: string
            format: uuid
          description: Optional repo filter within the project.

    CodeCitation:
      type: object
      required:
        - kind
        - filePath
        - repoId
      properties:
        kind:
          type: string
          enum: [code]
        repoId:
          type: string
          format: uuid
        filePath:
          type: string
        span:
          type: object
          additionalProperties: true
        excerpt:
          type: string

    ChatAnswerChunkType:
      type: string
      enum:
        - token
        - citation
        - title
        - abstain
        - done

    ChatAnswerChunk:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ChatAnswerChunkType'
        content:
          type: string
        citation:
          $ref: '#/components/schemas/CodeCitation'
