# SINGLE SOURCE OF TRUTH for the browser <-> Node API.
# Edit here, then run codegen -> packages/shared-types. Do NOT hand-write TS types.
openapi: 3.1.0
info:
  title: CodeSage Node API
  version: 0.0.0
  description: >-
    Public, non-blocking API served by apps/api. See docs/final-solution.md §9.
servers:
  - url: /api
paths:
  /health:
    get:
      operationId: getApiHealth
      summary: API health check
      description: Returns the liveness status of the Node API service.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  # TODO(Phase 1): POST /auth/login, POST /users
  # TODO(Phase 1): POST /projects, POST /projects/{id}/repos
  # TODO(Phase 1): GET /projects/{id}/workflows | pages | questions
  # TODO(Phase 1): POST /projects/{id}/questions/{qid}/answer
  # TODO(Phase 1): WS /chat (documented separately), POST /webhooks/{provider}
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: ['ok']
          description: Always "ok" when the service is reachable.
        service:
          type: string
          description: Name of the reporting service.
  # TODO(Phase 1): User, Project, Repo, Citation, ...
