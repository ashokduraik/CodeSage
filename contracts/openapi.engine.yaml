# SINGLE SOURCE OF TRUTH for the Node API -> Python Engine service internal contract.
# Called by apps/api (not the browser). Edit here, then run codegen -> Pydantic models in apps/engine.
openapi: 3.1.0
info:
  title: CodeSage Engine API (internal)
  version: 0.1.0
  description: >-
    Internal API exposed by apps/engine. See docs/final-solution.md §8-§9 and
    docs/plans/phase-1-mvp-code-qa.md.
paths:
  /health:
    get:
      operationId: getEngineHealth
      summary: Engine service health check
      description: Returns the liveness status of the Python engine service.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /engine/query:
    post:
      operationId: engineQuery
      summary: Stream a grounded code/product answer with citations
      description: >-
        Accepts a question and streams answer chunks via Server-Sent Events (SSE).
        Each event is a JSON-encoded EngineAnswerChunk. When retrieval confidence is
        too low, emits an `abstain` chunk instead of hallucinating (NFR-7).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineQueryRequest'
      responses:
        '200':
          description: >-
            SSE stream of EngineAnswerChunk objects (`data: {json}\n\n`).
            Terminal event uses type `done` or `abstain`.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/EngineAnswerChunk'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineErrorResponse'
        '404':
          description: Project or repo not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: ['ok']
          description: Always "ok" when the service is reachable.
        service:
          type: string
          description: Name of the reporting service.

    QueryAudience:
      type: string
      enum:
        - developer
        - end_user
      description: >-
        developer — code-level retrieval over code_chunks (Phase 1).
        end_user — product KB path (Phase 6; Phase 1 returns abstain).

    ChatTurnRole:
      type: string
      enum:
        - user
        - assistant
      description: Role of a prior conversation turn sent to the LLM (system prompts are server-owned).

    ChatTurn:
      type: object
      required:
        - role
        - content
      properties:
        role:
          $ref: '#/components/schemas/ChatTurnRole'
        content:
          type: string
          minLength: 1
          maxLength: 8000
          description: Prior turn text (user question or assistant answer).

    EngineQueryRequest:
      type: object
      required:
        - question
        - projectId
        - audience
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 8000
          description: Natural-language question from the user.
        projectId:
          type: string
          format: uuid
          description: Project scope for retrieval.
        repoIds:
          type: array
          items:
            type: string
            format: uuid
          description: Optional repo filter; when omitted, all project repos are searched.
        audience:
          $ref: '#/components/schemas/QueryAudience'
        generateTitle:
          type: boolean
          default: false
          description: >-
            When true, emit a `title` chunk summarizing the question (first message
            in a conversation).
        history:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/ChatTurn'
          description: >-
            Prior conversation turns (oldest first). Node builds this from stored
            messages; the engine trims oldest turns when the context window is exceeded.
        pageContext:
          type: string
          maxLength: 500
          description: Optional current UI route for page-scoped product questions (Phase 6).

    CodeCitation:
      type: object
      required:
        - kind
        - filePath
        - repoId
      properties:
        kind:
          type: string
          enum: [code]
          description: Citation source type.
        repoId:
          type: string
          format: uuid
          description: Repo containing the cited file.
        filePath:
          type: string
          description: Relative path within the repo.
        span:
          type: object
          additionalProperties: true
          description: Optional start/end line or character span metadata.
        excerpt:
          type: string
          description: Short excerpt shown in the UI citation chip.

    EngineAnswerChunkType:
      type: string
      enum:
        - token
        - citation
        - title
        - abstain
        - metrics
        - done
        - error
      description: >-
        token — streamed answer text fragment.
        citation — a grounding reference emitted before or during the answer.
        title — short conversation title derived from the first question.
        abstain — model could not ground an answer; stream ends.
        metrics — answer metrics (context window, tokens, tokens/sec) emitted before done.
        done — successful completion marker.
        error — transport/runtime failure after the stream started; stream ends.

    AnswerMetrics:
      type: object
      required:
        - contextChunks
      description: >-
        Per-answer metrics for display in the chat UI. Emitted only on the grounded
        LLM path; token/timing fields are absent when the backend does not report usage.
      properties:
        contextChunks:
          type: integer
          description: Number of code excerpts packed into the LLM prompt.
        contextTokens:
          type: integer
          description: Estimated context tokens sent to the model.
        maxContextTokens:
          type: integer
          description: Detected (or configured) max context window of the connected model.
        promptTokens:
          type: integer
          description: Prompt tokens the backend reported consuming.
        completionTokens:
          type: integer
          description: Completion tokens the backend reported generating.
        totalTokens:
          type: integer
          description: Total tokens (prompt + completion) reported by the backend.
        tokensPerSecond:
          type: number
          description: Generation speed (completion tokens / elapsed seconds).
        elapsedMs:
          type: integer
          description: Wall-clock generation time in milliseconds.
        model:
          type: string
          description: Model name that produced the answer.

    EngineAnswerChunk:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/EngineAnswerChunkType'
        content:
          type: string
          description: >-
            Text fragment when type is `token`, abstain reason when type is `abstain`,
            or human-readable failure message when type is `error`.
        code:
          type: string
          description: Machine-readable error code when type is `error` (e.g. ENGINE_ERROR).
        citation:
          $ref: '#/components/schemas/CodeCitation'
        metrics:
          $ref: '#/components/schemas/AnswerMetrics'

    EngineErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
