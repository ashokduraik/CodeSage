# GPU inference overlay for Phase 1 local development.
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile gpu up -d
#
# Requires NVIDIA Container Toolkit for CUDA services. CPU-only TEI works without a GPU.

services:
  tei:
    profiles: ["gpu"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    environment:
      MODEL_ID: ${TEI_EMBED_MODEL:-BAAI/bge-large-en-v1.5}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  tei-rerank:
    profiles: ["gpu"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    environment:
      MODEL_ID: ${TEI_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  vllm:
    profiles: ["gpu"]
    image: vllm/vllm-openai:latest
    command: >-
      --model ${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      --host 0.0.0.0
      --port 8000
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  engine:
    environment:
      TEI_BASE_URL: ${TEI_BASE_URL:-http://tei:80}
      TEI_EMBED_MODEL: ${TEI_EMBED_MODEL:-BAAI/bge-large-en-v1.5}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000/v1}
      VLLM_MODEL: ${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
    depends_on:
      tei:
        condition: service_healthy
        required: false
