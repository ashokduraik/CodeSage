name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Codegen up to date (contracts -> types)
        run: npm run codegen:check
      - run: npm run lint
      - run: npm run typecheck
      - name: Test (80% coverage gate)
        run: npm run test
      - run: npm run build

  python:
    name: Python (test, 100% coverage)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [apps/rag]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        working-directory: ${{ matrix.project }}
        run: uv lock && uv sync --dev
      - name: Test (100% coverage gate)
        working-directory: ${{ matrix.project }}
        run: uv run pytest

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [js, python]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t codesage-api .
      - run: docker build -f apps/web/Dockerfile -t codesage-web .
      - run: docker build -f apps/rag/Dockerfile -t codesage-rag .
